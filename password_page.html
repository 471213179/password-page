<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Protected Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }
        
        .password-section {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .password-section h2 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .password-section p {
            color: #666;
            margin-bottom: 20px;
        }
        
        .password-input {
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            width: 250px;
            margin-right: 10px;
        }
        
        .password-btn {
            padding: 12px 24px;
            font-size: 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .password-btn:hover {
            background: #45a049;
        }
        
        .content-section {
            display: none;
            padding: 20px;
            background: white;
            border-radius: 10px;
            border: 1px solid #eee;
        }
        
        .content-section h3 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .content-section p {
            line-height: 1.6;
            color: #555;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 14px;
        }
        
        .error-message {
            color: #f44336;
            margin-top: 10px;
            display: none;
        }
        
        .last-update {
            text-align: right;
            color: #888;
            font-size: 12px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="password-section" id="passwordSection">
            <h2>🔒 Password Access</h2>
            <p>Please enter the password to view the content:</p>
            <input type="password" id="passwordInput" class="password-input" placeholder="Enter access password">
            <button onclick="checkPassword()" class="password-btn">Confirm</button>
            <div id="errorMessage" class="error-message">❌ Incorrect password, please try again</div>
        </div>
        
        <div class="content-section" id="contentSection">
            <h3>📋 Password Information</h3>
            <p id="contentDisplay"></p>
            <div class="last-update">
                Last updated: 2026-06-19 22:51:43
            </div>
        </div>
    </div>

    <script>
        // Correct password
        const correctPassword = "3030";
        let attempts = 0;
        const maxAttempts = 3;
        
        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            const errorElement = document.getElementById('errorMessage');
            
            if (input === correctPassword) {
                // Password correct, show content
                document.getElementById('passwordSection').style.display = 'none';
                document.getElementById('contentSection').style.display = 'block';
                
                // Display actual content
                const content = `（2026-06-19 22:51:42）分别：材料岛 1.0非卖品岛1.0家具岛2.0家具岛DIy料理岛 (中国)
- 【花 材料島】: CD3P3
- 【1.0非賣品】: 752P3
- 【1.0 普通傢具】: G2PBK
- 【2.0新物品】: 6VMQ8
- 【diy料理衣服】: 8QRMH
- 【3.0新物品】: 8DW2N
- 【服装或其他】: 6VMQ8
- 【材料岛里的村民目录】: | Agnes | Merengue | Rodney | Sprinkle | Marshal | Octavian | Raymond | Rory |



（2026-06-19 10:51:42）Sections: Material Island 1.0, Non-Sale Island 1.0, Furniture Island 2.0, Furniture Island 1.0, DIY Recipe Island Furniture Island 3.0,  (美国)
- [Flower Material Island]: CD3P3
- [1.0 Rare Items]: 752P3
- [1.0 Normal Furniture]: G2PBK
- [2.0 New Items]: 6VMQ8
- [DIY Recipe Clothing]: 8QRMH
- [3.0 New Items]: 8DW2N
- [Clothes Island ]: 6VMQ8
- [Villager Directory in Material Island]: | Agnes | Merengue | Rodney | Sprinkle | Marshal | Octavian | Raymond | Rory |




`;
                document.getElementById('contentDisplay').innerHTML = content.replace(/\n/g, '<br>');
            } else {
                // Password incorrect
                attempts++;
                errorElement.style.display = 'block';
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
                
                if (attempts >= maxAttempts) {
                    errorElement.textContent = '❌ Too many incorrect attempts, please try again later';
                    document.querySelector('.password-btn').disabled = true;
                    setTimeout(() => {
                        document.querySelector('.password-btn').disabled = false;
                        attempts = 0;
                        errorElement.textContent = '❌ Incorrect password, please try again';
                    }, 30000);
                }
            }
        }
        
        // Allow submitting with Enter key
        document.getElementById('passwordInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                checkPassword();
            }
        });
        
        // Auto-focus on password input
        document.getElementById('passwordInput').focus();
    </script>
</body>
</html>
